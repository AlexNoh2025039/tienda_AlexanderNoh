<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar Detalle' : 'Nuevo Detalle'"></title>

    <style>
        :root {
            --azul-principal: #64B5F6;
            --azul-oscuro: #1E3A8A;
            --durazno: #FFCCBC;
            --gris: #E0E0E0;
            --texto: #333333;
            --blanco: #ffffff;
            --rojo: #d00000;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--azul-principal), var(--durazno));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--texto);
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 550px;
            background: var(--blanco);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: var(--azul-oscuro);
            margin-bottom: 20px;
        }

        .campo {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: var(--azul-principal);
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gris);
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--azul-principal);
        }

        .error {
            color: var(--rojo);
            font-size: 13px;
            margin-top: 4px;
        }

        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-guardar {
            background-color: var(--azul-principal);
            color: white;
        }

        .btn-guardar:hover {
            background-color: var(--azul-oscuro);
        }

        .btn-volver {
            background-color: var(--durazno);
            color: #333;
        }

        .btn-volver:hover {
            background-color: #ffb199;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1 th:text="${modoEdicion} ? 'Editar Detalle' : 'Nuevo Detalle'"></h1>

        <form th:action="${modoEdicion} ? @{/detallePedido/actualizar/{id}(id=${detallePedido.idDetalle})} : @{/detallePedido/guardar}"
              th:object="${detallePedido}"
              method="post">

            <input type="hidden" th:field="*{idDetalle}">

            <div class="campo">
                <label>Cantidad</label>
                <input type="number" th:field="*{cantidad}">
                <div class="error"
                     th:if="${#fields.hasErrors('cantidad')}"
                     th:errors="*{cantidad}"></div>
            </div>

            <div class="campo">
                <label>Precio Unitario</label>
                <input type="number" step="0.01" th:field="*{precioUnitario}">
                <div class="error"
                     th:if="${#fields.hasErrors('precioUnitario')}"
                     th:errors="*{precioUnitario}"></div>
            </div>

            <div class="campo">
                <label>ID Pedido</label>
                <input type="number" th:field="*{idPedido}">
                <div class="error"
                     th:if="${#fields.hasErrors('idPedido')}"
                     th:errors="*{idPedido}"></div>
            </div>

            <div class="campo">
                <label>ID Producto</label>
                <input type="number" th:field="*{idProducto}">
                <div class="error"
                     th:if="${#fields.hasErrors('idProducto')}"
                     th:errors="*{idProducto}"></div>
            </div>

            <div class="acciones">
                <button type="submit"
                        class="btn btn-guardar"
                        th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'"></button>

                <a th:href="@{/detallePedido}" class="btn btn-volver">Volver</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
