<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Pedido</title>

    <style>
        :root {
            --azul-principal: #64B5F6;
            --azul-oscuro: #1E3A8A;
            --durazno: #FFCCBC;
            --gris: #E0E0E0;
            --texto: #333333;
            --blanco: #ffffff;
            --rojo: #d00000;
            --verde: #4CAF50;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--azul-principal), var(--durazno));
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px 0;
            color: var(--texto);
        }

        .contenedor {
            width: 95%;
            max-width: 1100px;
            background: var(--blanco);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .titulo {
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            color: var(--azul-oscuro);
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-nuevo {
            background-color: var(--azul-principal);
            color: white;
        }

        .btn-nuevo:hover {
            background-color: var(--azul-oscuro);
        }

        .btn-editar {
            background-color: var(--azul-principal);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .btn-editar:hover {
            background-color: var(--azul-oscuro);
        }

        .btn-eliminar {
            background-color: var(--rojo);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .btn-eliminar:hover {
            opacity: 0.8;
        }

        .btn-buscar {
            background-color: var(--verde);
            color: white;
            padding: 7px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-buscar:hover {
            opacity: 0.85;
        }

        form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        input {
            padding: 7px;
            border: 1px solid var(--gris);
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid var(--gris);
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: var(--azul-principal);
            color: white;
        }

        .acciones {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .mensaje-error {
            color: var(--rojo);
            text-align: center;
            margin-top: 10px;
        }

        .top-links {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <h1 class="titulo">Lista de Detalles de Pedido 🧾</h1>

    <div class="top-links">
        <a th:href="@{/detallePedido/nuevo}" class="btn btn-nuevo">Nuevo Detalle</a>
        <a th:href="@{/home}" class="btn btn-nuevo">Home</a>
    </div>

    <form action="/detallePedido/buscar" method="get">
        <input type="number" name="idDetalle" placeholder="Buscar por ID">
        <button type="submit" class="btn-buscar">Buscar</button>
        <a th:href="@{/detallePedido}" class="btn btn-nuevo">Reiniciar</a>
    </form>

    <div th:if="${detalleEncontrado != null}">
        <h3 style="text-align:center;">Resultado</h3>
        <table>
            <tr>
                <th>ID</th>
                <th>Cantidad</th>
                <th>Precio Unitario</th>
                <th>ID Pedido</th>
                <th>ID Producto</th>
            </tr>
            <tr>
                <td th:text="${detalleEncontrado.idDetalle}"></td>
                <td th:text="${detalleEncontrado.cantidad}"></td>
                <td th:text="${detalleEncontrado.precioUnitario}"></td>
                <td th:text="${detalleEncontrado.idPedido}"></td>
                <td th:text="${detalleEncontrado.idProducto}"></td>
            </tr>
        </table>
    </div>

    <div th:if="${error != null}" class="mensaje-error">
        <p th:text="${error}"></p>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>CANTIDAD</th>
            <th>PRECIO UNITARIO</th>
            <th>ID PEDIDO</th>
            <th>ID PRODUCTO</th>
            <th>ACCIONES</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="detalle : ${detalles}">
            <td th:text="${detalle.idDetalle}"></td>
            <td th:text="${detalle.cantidad}"></td>
            <td th:text="${detalle.precioUnitario}"></td>
            <td th:text="${detalle.idPedido}"></td>
            <td th:text="${detalle.idProducto}"></td>
            <td>
                <div class="acciones">
                    <a th:href="@{/detallePedido/editar/{id}(id=${detalle.idDetalle})}" class="btn-editar">Editar</a>
                    <a th:href="@{/detallePedido/eliminar/{id}(id=${detalle.idDetalle})}"
                       class="btn-eliminar"
                       onclick="return confirm('¿Desea eliminar este Detalle?')">
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
