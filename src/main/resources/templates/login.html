<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <style>
        :root {
            --azul-principal: #64B5F6;
            --azul-oscuro: #1E3A8A;
            --durazno: #FFCCBC;
            --gris: #E0E0E0;
            --texto: #333333;
            --blanco: #ffffff;
            --rojo: #d00000;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, var(--azul-principal), var(--durazno));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--texto);
        }

        .card {
            background-color: var(--blanco);
            padding: 35px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        .titulo {
            font-size: 28px;
            color: var(--azul-oscuro);
            margin-bottom: 5px;
        }

        .subtitulo {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .error {
            background-color: #ffe5e5;
            color: var(--rojo);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .campo {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            font-weight: bold;
            color: var(--azul-principal);
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--gris);
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: var(--azul-principal);
        }

        .boton {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--azul-principal);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .boton:hover {
            background-color: var(--azul-oscuro);
        }
    </style>
</head>

<body>

<div class="card">

    <h1 class="titulo">Bienvenido</h1>
    <p class="subtitulo">Inicia sesión para continuar</p>

    <div th:if="${param.error}" class="error">
        Usuario o contraseña incorrectos
    </div>

    <form th:action="@{/login}" method="post">

        <div class="campo">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="boton">Ingresar</button>

    </form>

</div>

</body>
</html>
